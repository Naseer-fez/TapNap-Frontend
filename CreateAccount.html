<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<style>
    body {
        background-color: rgba(255, 217, 166, 0.23);
    }

    .Parent {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .LoginBox {

        justify-content: center;
        align-items: center;
        height: 100vh;
        padding: 20px;
        text-align: center;
        width: 40%;
        max-width: 600px;
        min-height: 40%;
        height: auto;
        border: 2;
        box-shadow: 15px 15px 15px rgba(134, 134, 220, 0.881);
        border: 2px double;

    }

    .Heading {

        color: rgb(42, 74, 123);

    }

    .Labls {
        display: flex;
        justify-content: center;
        align-items: center;

        height: 100vh;
        padding: 10px;
        width: 50%;
        max-width: 300px;
        min-height: 12px;
        height: auto;
        border: 2;
        box-shadow: 15px 15px 15px rgba(134, 134, 220, 0.881);
    }

    input {

        text-align: center;
        color: blue;
        padding: 2px;
    }
</style>

<body>
    <div class="Parent">
        <div class="LoginBox">
            <!-- <div class="box">
                <h2 class="Heading">CreateAccount</h2>
              Try to make this happen  -->
            <!-- </div> -->
            <h2 class="Heading">CreateAccount</h2>
            <div class="labls">
                <input type="text" id="username" placeholder="username" required>

                <input type="password" id="password" placeholder="Password" required>
                <input type="password" id="Repass" placeholder=" Re Enter Password" required>

            </div>
            <br>
            <button type="button" id="btn">SUBMIT</button>
        </div>
    </div>


    <script src="config.js"></script>
    <script src="Utils.js"></script>
    <script>

        // if(CheckifAlreadyExist){
        // console.log("User is already logged in. Redirecting...");
        //     window.location.href = CONFIG["Redirect"];

        // }
        // CheckifAlreadyExist();


        const btn = document.getElementById("btn");
        btn.addEventListener("click", async () => {


            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const Repass = document.getElementById("Repass").value;
            // const Email = document.getElementById("email").value;
            if (!password || !Repass || !username) {
                alert("You Havent Entered All the Fields!!");
                return;
            }
            if (password !== Repass) {
                alert("You haven't entered the correct Password");
                return;
            }
            if (password.length < 8) {
                alert("The password Lenght shoudl be 8 characters long");
                return;
            }

            const userData = {
                "username": username,
                "password": password
            };
            URL = CONFIG["BACKENDURL"]

            try {
                const Response = await fetch(`${URL}/Register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });
                const Data = await Response.json()
                // console.log(Data["Report"])
                // console.log(Data)
                // console.log(Response.status)
                // {Report: 'GO', Status: 'Fail', Userid: -1}
                if (Response.status === 400) {
                    //That means some erro as occured
                    alert(`Thier is a error ${Data["Report"]}`);
                    return;


                }
                alert("You Have Been Succesfully Logged in ");
                const id = Data["Userid"]
                const expiry = `expires=${60 * 60 * 24 * 365 * 3} ;`
                const path = "path=/";
                const sameSite = "SameSite=Lax";

                localStorage.setItem("Userid", id);
                localStorage.setItem("username", username)
                document.cookie = `Userid=${id}; ${expiry}; ${path}; ${sameSite}`;
                document.cookie = `username=${username}; ${expiry}; ${path}; ${sameSite}`;
                // console.log(decodeURIComponent(document.cookie))



            } catch (error) {
                console.log(error);
            }


        });
// console.log(getCookie("Userid"))
    </script>
</body>

</html>
