<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapNap - Set New Password</title>
  <link rel="icon" type="image/png" href="/TCP.png">
  <link rel="stylesheet" href="/main.css">
</head>
<body>

  <a href="/" class="logo-corner">
    <img src="/TCP.png" alt="TapNap Logo">
    <span class="logo-corner__name">TapNap</span>
  </a>

  <main class="page">
    <div class="card">
      <p class="card__eyebrow">Account Recovery</p>
      <h1 class="card__title">Set a new password.</h1>

      <!-- Username chip — shown when server returns a username -->
      <div class="email-chip" id="reset-username-chip" style="display:none">
        <span>👤</span>
        <span id="reset-username-label"></span>
      </div>

      <div class="email-chip" id="reset-email-chip" style="display:none">
        <span>@</span>
        <span id="reset-email-label"></span>
      </div>

      <p class="card__sub">
        Create the password you want to use for your account now.
      </p>

      <div class="field">
        <label for="password">New Password</label>
        <input
          id="password"
          type="password"
          placeholder="Minimum 8 characters"
          autocomplete="new-password"
          autofocus
        >
      </div>

      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input
          id="confirm-password"
          type="password"
          placeholder="Repeat your new password"
          autocomplete="new-password"
        >
      </div>

      <button class="btn btn--primary" id="btn-submit">Update Password</button>
      <button class="btn btn--ghost" id="btn-back">Back to Code</button>
    </div>
  </main>

  <script src="/config.js"></script>
  <script src="/utils.js"></script>
  <script>
    var params   = new URLSearchParams(window.location.search);
    var userId   = params.get('id')      || sessionStorage.getItem('resetUserId')  || '';
    var email    = params.get('message') || sessionStorage.getItem('resetEmail')   || '';
    var username = sessionStorage.getItem('resetUsername') || '';

    /* Show username chip if available */
    if (username) {
      document.getElementById('reset-username-label').textContent = username;
      document.getElementById('reset-username-chip').style.display = 'inline-flex';
    }

    /* Show email chip if available */
    if (email) {
      document.getElementById('reset-email-label').textContent = email;
      document.getElementById('reset-email-chip').style.display = 'inline-flex';
    }

    document.getElementById('btn-back').addEventListener('click', function() {
      window.location.href = CONFIG.ROUTES.CODE_OTP;
    });

    document.getElementById('confirm-password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('btn-submit').click();
    });

    document.getElementById('btn-submit').addEventListener('click', async function() {
      var password        = document.getElementById('password').value;
      var confirmPassword = document.getElementById('confirm-password').value;
      var btn             = document.getElementById('btn-submit');

      if (!userId) {
        showToast('Missing user ID. Please restart the reset flow.', 'error');
        return;
      }
      if (!password || !confirmPassword) {
        showToast('Please fill in both password fields.');
        return;
      }
      if (password.length < 8) {
        showToast('Password must be at least 8 characters.');
        return;
      }
      if (password !== confirmPassword) {
        showToast('Passwords do not match.');
        return;
      }

      var parsedId  = Number(userId);
      var payloadId = String(parsedId) === String(userId) ? parsedId : userId;

      setLoading(btn, true);
      var result = await apiFetch(CONFIG.API.VERIFY, {
        method: 'POST',
        body: JSON.stringify({
          id:       payloadId,
          password: password,
        }),
      });
      setLoading(btn, false);

      if (!result.ok) {
        showToast(result.data.Report || result.data.message || ('Error ' + result.status), 'error');
        return;
      }

      showToast('Password updated. Redirecting to sign in...', 'success');
      setTimeout(function() {
        sessionStorage.removeItem('resetUserId');
        sessionStorage.removeItem('resetEmail');
        sessionStorage.removeItem('resetUsername');
        window.location.replace(CONFIG.ROUTES.LOGIN);
      }, 900);
    });
  </script>
</body>
</html>
