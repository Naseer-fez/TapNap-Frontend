<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapNap — Sign In</title>
  <link rel="stylesheet" href="/main.css">
</head>
<body>

  <!-- Logo — top-right on every page -->
  <a href="/" class="logo-corner">
    <img src="/TCP.png" alt="TapNap Logo">
    <span class="logo-corner__name">TapNap</span>
  </a>

  <main class="page">
    <div class="card">
      <p class="card__eyebrow">Welcome back</p>
      <h1 class="card__title">Sign in.</h1>
      <p class="card__sub">Access your link management dashboard.</p>

      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          placeholder="your_username"
          autocomplete="username"
          autofocus
        >
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
        >
      </div>

      <button class="btn btn--primary" id="btn-login">Sign In</button>

      <div class="divider">or</div>

      <button class="btn btn--ghost" id="btn-register">Create an account</button>
      <button class="btn btn--ghost" id="btn-forgot">Forgot password?</button>
    </div>
  </main>

  <script src="/config.js"></script>
  <script src="/utils.js"></script>
  <script>
    checkIfAlreadyLoggedIn();

    document.getElementById('btn-register').addEventListener('click', function() {
      window.location.href = CONFIG.ROUTES.REGISTER;
    });
    document.getElementById('btn-forgot').addEventListener('click', function() {
      window.location.href = CONFIG.ROUTES.FORGOT;
    });

    /* Enter key submits */
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });

    document.getElementById('btn-login').addEventListener('click', async function() {
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var btn      = document.getElementById('btn-login');

      if (!username || !password) { showToast('Please enter username and password.'); return; }
      if (password.length < 8)   { showToast('Password must be at least 8 characters.'); return; }

      setLoading(btn, true);
      var result = await apiFetch(CONFIG.API.LOGIN, {
        method: 'POST',
        body:   JSON.stringify({ username: username, password: password }),
      });
      setLoading(btn, false);

      if (!result.ok) { showToast(result.data.Report || ('Error ' + result.status)); return; }

      /* Try multiple possible key names for the user ID */
      console.log('Login response:', JSON.stringify(result.data));
      var userId = result.data.Userid || result.data.userid || result.data.user_id 
                || result.data.id || result.data.ID || result.data.UserId;
      if (!userId) {
        showToast('Login succeeded but no user ID returned. Check console.', 'error');
        console.error('Could not find user ID in response:', result.data);
        return;
      }
      saveSession(userId, username);
      showToast('Signed in!', 'success');
      setTimeout(function() { window.location.replace(CONFIG.ROUTES.MAIN); }, 700);
    });
  </script>
</body>
</html>
